apiVersion: apps/v1
kind: Deployment
metadata:
  name: festival-info
spec:
  replicas: 1
  selector:
    matchLabels:
      app: festival-info
  template:
    metadata:
      labels:
        app: festival-info
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
